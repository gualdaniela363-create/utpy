<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mega Feirão - Oferta Exclusiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            /* Fundo Escuro com Degradê Radial para destacar o centro */
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            color: #ffffff;
        }

        /* Partículas de fundo (Efeito Ouro) */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0.8; }
        }

        .loader-box {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 45px 28px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.2);
            animation: fadeUp 1s ease;
            z-index: 2;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 800;
            /* Gradiente Dourado */
            background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 15px;
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            /* Gradiente de Progresso Dourado */
            background: linear-gradient(90deg, #FDB931, #FFD700, #ffffff);
            border-radius: 20px;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .percent-text {
            margin-top: 15px;
            font-size: 24px;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .link-btn {
            display: none; /* Escondido até carregar 100% */
            margin-top: 35px;
            padding: 18px 0;
            background: #FFD700;
            color: #000000;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>
    <script>
        // Criar partículas douradas
        for (let i = 0; i < 25; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.top = Math.random() * 100 + "vh";
            p.style.animationDuration = (3 + Math.random() * 5) + "s";
            p.style.delay = Math.random() * 5 + "s";
            document.body.appendChild(p);
        }
    </script>

    <div class="loader-box">
        <div class="title">MEGA FEIRÃO</div>
        <div class="subtitle">Analisando seu CPF para liberar o maior desconto possível...</div>
        
        <div class="progress-bar">
            <div id="progress" class="progress-fill"></div>
        </div>
        <div id="percent" class="percent-text">0%</div>

        <a href="https://lucky-mooncake-c140db.netlify.app/" id="final-btn" class="link-btn">
            VER MINHA OFERTA
        </a>
    </div>

    <script>
        let percent = 0;
        const bar = document.getElementById("progress");
        const text = document.getElementById("percent");
        const btn = document.getElementById("final-btn");

        const loading = setInterval(() => {
            if (percent < 90) {
                percent += Math.floor(Math.random() * 4) + 1;
            } else if (percent < 100) {
                percent += 1;
            }

            if (percent > 100) percent = 100;
            
            bar.style.width = percent + "%";
            text.innerText = percent + "%";
                        
            if (percent >= 100) {
                clearInterval(loading);
                text.innerText = "DESCONTO LOCALIZADO!";
                text.style.color = "#FFD700";
                // Mostrar o botão ao finalizar
                btn.style.display = "block";
            }
        }, 60);
    </script>
</body>
</html>
