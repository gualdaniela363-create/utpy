<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mega Feirão - Preparando Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            /* Fundo Azul Marinho Profundo com Degradê Radial */
            background: radial-gradient(circle at center, #0a133d 0%, #030616 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            color: #ffffff;
        }

        /* Partículas de fundo (Efeito de Profundidade) */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 242, 255, 0.4);
            border-radius: 50%;
            animation: float 6s linear infinite;
            filter: blur(1px);
        }

        @keyframes float {
            from { transform: translateY(110vh) scale(0.5); opacity: 0; }
            to { transform: translateY(-10vh) scale(1.2); opacity: 1; }
        }

        .loader-box {
            width: 90%;
            max-width: 420px;
            /* Efeito Glassmorphism (Vidro) */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 45px 28px;
            /* Sombra suave e borda luminosa */
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeUp 1s ease;
            z-index: 2;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 800;
            /* Gradiente no Texto */
            background: linear-gradient(135deg, #ffffff 30%, #00f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 15px;
            color: #a0aec0;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            /* Gradiente Vivo: Azul Royal para Ciano */
            background: linear-gradient(90deg, #2563eb, #00f2ff, #10b981);
            border-radius: 20px;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .percent-text {
            margin-top: 15px;
            font-size: 24px;
            font-weight: 700;
            color: #00f2ff;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .link-btn {
            display: block;
            margin-top: 35px;
            padding: 18px 0;
            /* Botão Sólido e Moderno */
            background: #ffffff;
            color: #030616;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }

        .link-btn:hover {
            transform: translateY(-3px);
            background: #00f2ff;
            color: #030616;
            box-shadow: 0 15px 35px rgba(0, 242, 255, 0.4);
        }
    </style>
</head>
<body>
    <script>
        // Criar partículas flutuantes
        for (let i = 0; i < 20; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = (4 + Math.random() * 8) + "s";
            p.style.opacity = Math.random();
            document.body.appendChild(p);
        }
    </script>

    <div class="loader-box">
        <div class="title">MEGA FEIRÃO</div>
        <div class="subtitle">Buscando as melhores condições para limpar seu nome...</div>

        <div class="progress-bar">
            <div id="progress" class="progress-fill"></div>
        </div>

        <div id="percent" class="percent-text">0%</div>

        <a href="https://sage-cuchufli-667eb0.netlify.app/" class="link-btn">
            CONTINUAR
        </a>
    </div>

    <script>
        let percent = 0;
        const bar = document.getElementById("progress");
        const text = document.getElementById("percent");

        const loading = setInterval(() => {
            if (percent < 90) {
                percent += Math.floor(Math.random() * 3) + 1;
            } else if (percent < 100) {
                percent += 1;
            }

            if (percent > 100) percent = 100;

            bar.style.width = percent + "%";
            text.innerText = percent + "%";
            
            if (percent >= 100) {
                clearInterval(loading);
                text.innerText = "DESCONTO DISPONÍVEL!";
                text.style.color = "#10b981"; // Verde ao finalizar
            }
        }, 70);
    </script>
</body>
</html>
